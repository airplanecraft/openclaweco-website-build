<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Simulator — Chapter 9: Package as MCP</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/terminal.css">
</head>
<body>
  <div class="app-layout">
    <!-- Left Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">C</div>
        <div>
          <div class="sidebar-title" id="sidebar-title">Claude Code</div>
          <div class="sidebar-subtitle" id="sidebar-subtitle">Simulator</div>
        </div>
      </div>
      <div class="chapter-list" id="chapter-list"></div>
      <div class="sidebar-footer">
        <button class="lang-toggle" id="lang-toggle">🌐 中文</button>
        <button class="reset-btn" id="reset-btn">Reset</button>
      </div>
    </aside>

    <!-- Center: Terminal -->
    <main class="main-area">
      <div class="mobile-header">
        <button class="hamburger-btn" id="hamburger-btn">☰</button>
        <span class="mobile-title">Claude Code Simulator</span>
        <button class="file-toggle-btn" id="file-toggle-btn">Files</button>
      </div>
      <div class="progress-bar">
        <span class="progress-label" id="progress-label"></span>
        <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <span class="progress-steps" id="progress-steps">0/0</span>
      </div>
      <div class="instruction-panel">
        <div class="instruction-icon">→</div>
        <div class="instruction-text" id="instruction-text">Loading...</div>
      </div>
      <div class="terminal-container">
        <div class="terminal">
          <div class="terminal-header">
            <div class="terminal-dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
            <span class="terminal-title">Terminal — Claude Code Simulator</span>
          </div>
          <div class="terminal-body" id="terminal-body"></div>
          <div class="terminal-input-area">
            <span class="terminal-prompt" id="terminal-prompt">~ $</span>
            <input type="text" class="terminal-input" id="terminal-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Type a command...">
          </div>
        </div>
        <div class="hint-area" id="hint-area"><span class="hint-text">Loading...</span></div>
      </div>
    </main>

    <!-- Right Panel: File Viewer -->
    <aside class="right-panel" id="right-panel">
      <div class="file-tree-section">
        <div class="file-tree-header">Files</div>
        <div class="file-tree" id="file-tree"></div>
      </div>
      <div class="file-viewer-section">
        <div class="file-viewer-header" id="file-viewer-header" style="display:none"></div>
        <div class="file-viewer-body" id="file-viewer-body">
          <div class="file-viewer-empty">Click a file to view its content</div>
        </div>
      </div>
    </aside>
  </div>

  <!-- Prism.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>

  <!-- App Scripts -->
  <script src="js/i18n.js"></script>
  <script src="js/state-manager.js"></script>
  <script src="js/virtual-fs.js"></script>
  <script src="js/terminal.js"></script>
  <script src="js/animator.js"></script>
  <script src="js/dialogue-engine.js"></script>
  <script src="js/hint-system.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/file-tree.js"></script>
  <script src="js/accessibility.js"></script>
  <script src="js/mobile-gestures.js"></script>
  <script src="js/file-viewer.js"></script>
  <script src="js/chapter-nav.js"></script>
  <script src="scenarios/index.js"></script>

  <!-- Chapter-specific -->
  <script>var CHAPTER_ID = 'ch09';</script>
  <script src="scenarios/09-graduation.js"></script>
  <script src="js/app.js"></script>
  <script src="js/brand-bar.js"></script>
</body>
</html>
